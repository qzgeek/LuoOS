<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>HEOS Panel</title>
<style>
@font-face{
  font-family:"HEOS Google Sans";
  src:
    local("Google Sans"),
    local("GoogleSans-Regular"),
    local("Google Sans Text"),
    local("Product Sans"),
    local("ProductSans-Regular");
  font-weight:400 900;
  font-style:normal;
  font-display:swap;
}
:root{
  --bg:#f5f5f7;
  --card:#fff;
  --line:rgba(0,0,0,.075);
  --text:#111214;
  --muted:#74777d;
  --black:#111214;
  --shadow:0 18px 44px rgba(0,0,0,.045);
  --font-ui:"HEOS Google Sans","Google Sans","Product Sans","Google Sans Text",Roboto,"Noto Sans SC","Microsoft YaHei UI","PingFang SC","Hiragino Sans GB",Arial,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  --ease:cubic-bezier(.22,1,.36,1);
  --spring:cubic-bezier(.34,1.56,.64,1);
  --spring-soft:cubic-bezier(.28,1.22,.36,1);
  --sidebar-expanded:218px;
  --sidebar-collapsed:64px;
  --sidebar-delta:calc(var(--sidebar-expanded) - var(--sidebar-collapsed));
  --content-max:930px;
  --theme-btn-size:46px;
  --main-pad-y:clamp(26px,3.8vw,46px);
  --main-pad-x:clamp(26px,5vw,70px);
  --phi:1.618;
  --phi-fast:.618s;
  --phi-slow:1.618s;
}
html[data-theme="dark"]{
  color-scheme:dark;
}
html[data-theme="dark"]{
  --bg:#111214;
  --card:#1a1b1f;
  --line:rgba(255,255,255,.10);
  --text:#f4f4f5;
  --muted:#a2a6ae;
  --black:#f4f4f5;
  --shadow:0 18px 44px rgba(0,0,0,.30);
}
html[data-theme="dark"] body{
  background:
    radial-gradient(circle at 34% -12%, rgba(80,82,92,.42), transparent 35%),
    radial-gradient(circle at 100% 0%, rgba(56,58,66,.42), transparent 34%),
    var(--bg);
}
html[data-theme="dark"] .sidebar{ background:rgba(24,25,29,.72); 
  backdrop-filter:blur(24px);
  -webkit-backdrop-filter:blur(24px);}
html[data-theme="dark"] .app.sidebar-collapsed .sidebar{ background:rgba(24,25,29,.82); }
html[data-theme="dark"] .app.sidebar-collapsed .logo{ background:#f4f4f5; color:#111214; }
html[data-theme="dark"] .nav-indicator{ background:#f4f4f5; box-shadow:0 14px 32px rgba(0,0,0,.36); }
html[data-theme="dark"] .nav-item{ color:#aaaeb6; }
html[data-theme="dark"] .nav-item:hover{ color:#f4f4f5; }
html[data-theme="dark"] .nav-item.active{ color:#111214; }
html[data-theme="dark"] .nav-item.active:hover{ color:#111214; }
html[data-theme="dark"] .lang-switch,
html[data-theme="dark"] .theme-toggle{
  background:rgba(24,25,29,.78);
  border-color:var(--line);
  box-shadow:0 8px 24px rgba(0,0,0,.22);

  backdrop-filter:blur(18px);
  -webkit-backdrop-filter:blur(18px);}
html[data-theme="dark"] .lang-indicator{ background:#f4f4f5; box-shadow:0 12px 28px rgba(0,0,0,.32); }
html[data-theme="dark"] .lang-btn{ color:#aaaeb6; }
html[data-theme="dark"] .lang-btn.active{ color:#111214; }
html[data-theme="dark"] .card{
  background:rgba(26,27,31,.86);
  box-shadow:0 1px 0 rgba(255,255,255,.05) inset;
}
html[data-theme="dark"] .card:hover{
  background:#202127;
  border-color:rgba(255,255,255,.14);
}
html[data-theme="dark"] .card.enabled{ border-color:rgba(255,255,255,.14); }
html[data-theme="dark"] .card.has-detail:hover .chevron{ color:#f4f4f5; background:#2a2b31; }
html[data-theme="dark"] .toggle{ background:#383a42; }
html[data-theme="dark"] .toggle.on{ background:#f4f4f5; }
html[data-theme="dark"] .toggle.on::after{ background:#111214; }
html[data-theme="dark"] .drawer{
  background:rgba(24,25,29,.94);
  box-shadow:-28px 0 70px rgba(0,0,0,.36);

  backdrop-filter:blur(28px);
  -webkit-backdrop-filter:blur(28px);}
html[data-theme="dark"] .close{ background:#2a2b31; color:#f4f4f5; }
html[data-theme="dark"] .close:hover{ background:#33343c; }
html[data-theme="dark"] .field input,
html[data-theme="dark"] .field textarea,
html[data-theme="dark"] .field select,
html[data-theme="dark"] .select-trigger{
  background:#202127;
  color:#f4f4f5;
  border-color:rgba(255,255,255,.11);
}
html[data-theme="dark"] .field input:focus,
html[data-theme="dark"] .field textarea:focus,
html[data-theme="dark"] .field select:focus,
html[data-theme="dark"] .select-trigger:focus-visible{
  background:#24252b;
  border-color:#f4f4f5;
  box-shadow:0 0 0 3px rgba(244,244,245,.10);
}
html[data-theme="dark"] .custom-select.open .select-trigger,
html[data-theme="dark"] .select-menu{
  background:#202127;
  border-color:rgba(255,255,255,.16);
}
html[data-theme="dark"] .select-option{ background:#202127; color:#f4f4f5; border-top-color:rgba(255,255,255,.07); }
html[data-theme="dark"] .select-option:hover{ background:#2a2b31; }
html[data-theme="dark"] .select-option.active{ background:#f4f4f5; color:#111214; }
*,
*::before,
*::after{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:var(--font-ui);
}
html{
  -webkit-text-size-adjust:100%;
  text-size-adjust:100%;
}
body{
  min-height:100vh;
  min-height:100dvh;
  background:
    radial-gradient(circle at 34% -12%, rgba(255,255,255,.95), transparent 35%),
    radial-gradient(circle at 100% 0%, rgba(220,220,224,.52), transparent 34%),
    var(--bg);
  color:var(--text);
  overflow:hidden;
  text-rendering:geometricPrecision;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
}
button,input,select,textarea{ font:inherit; }

.app{
  height:100vh;
  height:100dvh;
  display:flex;
  transition:transform .34s var(--ease), opacity .28s ease, filter .28s ease;
}
.app.drawer-open .main{
  transform:scale(.992) translateX(-7px);
  opacity:.88;
}

.sidebar{
  width:var(--sidebar-expanded);
  flex:0 0 var(--sidebar-expanded);
  position:relative;
  background:rgba(255,255,255,.74);
  backdrop-filter:none;
  -webkit-backdrop-filter:none;
  padding:22px 18px;
  overflow:hidden;
  transform-origin:left center;
  will-change:transform, box-shadow;
  transition:
    width .52s var(--spring-soft),
    flex-basis .52s var(--spring-soft),
    padding .52s var(--spring-soft),
    background-color .28s ease,
    box-shadow .28s ease;
}
.sidebar::after{
  content:"";
  position:absolute;
  top:0;
  right:0;
  width:1px;
  height:100%;
  background:var(--line);
  opacity:1;
  transform-origin:center;
  box-shadow:0 0 0 rgba(0,0,0,0);
  transition:
    background-color .28s ease,
    opacity .28s ease,
    transform .52s var(--spring-soft),
    box-shadow .28s ease;
}
.app.sidebar-collapsed .sidebar::after{
  background:rgba(0,0,0,.11);
  box-shadow:10px 0 26px rgba(0,0,0,.04);
}
.app.sidebar-collapsing .sidebar::after{
  animation:dividerCollapse .54s var(--spring) both;
}
.app.sidebar-expanding .sidebar::after{
  animation:dividerExpand .54s var(--spring) both;
}
.app.sidebar-collapsing .sidebar{
  animation:sidebarPanelCollapse .54s var(--spring) both;
}
.app.sidebar-expanding .sidebar{
  animation:sidebarPanelExpand .58s var(--spring) both;
}
.app.sidebar-expanding .nav,
.app.sidebar-expanding .logo{
  animation:sidebarContentExpand .42s var(--spring-soft);
}
.app.sidebar-collapsed .sidebar{
  width:var(--sidebar-collapsed);
  flex-basis:var(--sidebar-collapsed);
  padding:22px 9px;
}
.app.sidebar-collapsed .sidebar{
  background:rgba(255,255,255,.82);
}

.logo{
  height:46px;
  width:82px;
  display:inline-flex;
  align-items:center;
  justify-content:flex-start;
  font-size:25px;
  line-height:1;
  font-weight:820;
  letter-spacing:-.025em;
  margin-bottom:32px;
  cursor:pointer;
  user-select:none;
  white-space:nowrap;
  border-radius:16px;
  overflow:hidden;
  transition:
    width .52s var(--spring-soft),
    margin-bottom .52s var(--spring-soft),
    background-color .24s ease,
    color .24s ease,
    opacity .18s ease,
    transform .22s var(--ease);
}
.logo:hover{ opacity:.74; }
.logo:active{ transform:scale(.97); }
.logo-h{
  display:inline-block;
  line-height:1;
  transform:translateX(0);
  transition:
    transform .48s var(--spring) .08s,
    font-size .28s ease,
    color .24s ease;
}
.logo-rest{
  display:inline-block;
  line-height:1;
  opacity:1;
  transform:translateX(0);
  max-width:56px;
  letter-spacing:-.025em;
  transition:
    opacity .16s ease,
    transform .22s var(--ease),
    max-width .30s var(--ease) .03s,
    letter-spacing .22s ease;
}
.app.sidebar-collapsed .logo{
  width:46px;
  background:var(--black);
  color:white;
  margin:0 auto 28px;
}
.app.sidebar-collapsed .logo-rest{
  opacity:0;
  transform:translateX(-7px);
  max-width:0;
  letter-spacing:-.12em;
  transition:
    opacity .15s ease,
    transform .20s var(--ease),
    max-width .24s var(--ease) .04s,
    letter-spacing .16s ease;
}
.app.sidebar-collapsed .logo-h{
  font-size:20px;
  transform:translateX(15.5px);
  transition:
    transform .50s var(--spring) .10s,
    font-size .24s ease .08s,
    color .24s ease;
}

.nav{
  position:relative;
  display:flex;
  flex-direction:column;
  gap:9px;
}
.nav-indicator{
  position:absolute;
  left:0;
  top:0;
  width:100%;
  height:46px;
  border-radius:16px;
  background:var(--black);
  box-shadow:0 14px 32px rgba(0,0,0,.12);
  transform:translateY(var(--indicator-y,0px));
  transition:
    transform .52s var(--spring),
    width .48s var(--spring-soft),
    height .36s var(--ease),
    border-radius .42s var(--ease),
    opacity .22s ease;
  z-index:0;
}
.nav-item{
  position:relative;
  z-index:1;
  min-height:46px;
  width:100%;
  display:flex;
  align-items:center;
  padding:0 17px;
  border-radius:16px;
  color:#62666c;
  font-size:15px;
  font-weight:640;
  cursor:pointer;
  user-select:none;
  white-space:nowrap;
  overflow:hidden;
  outline:none;
  transition:
    color .24s ease,
    transform .22s var(--ease),
    padding .52s var(--spring-soft),
    width .52s var(--spring-soft);
}
.nav-letter{
  display:inline-block;
  min-width:.62em;
  line-height:1;
  transform:translateX(0);
  transition:
    transform .48s var(--spring) .08s,
    color .24s ease;
}
.nav-rest{
  display:inline-block;
  line-height:1;
  opacity:1;
  transform:translateX(0);
  max-width:160px;
  letter-spacing:0;
  transition:
    opacity .16s ease,
    transform .22s var(--ease),
    max-width .30s var(--ease) .03s,
    letter-spacing .22s ease;
}
.nav-item:hover{
  color:#111214;
  transform:translateX(2px);
}
.nav-item.active{ color:white; }
.nav-item.active:hover{
  color:white;
  transform:translateX(0);
}
.nav-item:focus-visible{
  outline:3px solid rgba(0,0,0,.12);
  outline-offset:3px;
}
.app.sidebar-collapsed .nav-indicator{
  width:46px;
  left:50%;
  transform:translate(-50%, var(--indicator-y,0px));
}
.app.sidebar-collapsed .nav-item{
  width:46px;
  margin:0 auto;
  padding:0;
  justify-content:flex-start;
}
.app.sidebar-collapsed .nav-rest{
  opacity:0;
  transform:translateX(-7px);
  max-width:0;
  letter-spacing:-.12em;
  transition:
    opacity .15s ease,
    transform .20s var(--ease),
    max-width .24s var(--ease) .04s,
    letter-spacing .16s ease;
}
.app.sidebar-collapsed .nav-letter{
  transform:translateX(18px);
  transition:
    transform .50s var(--spring) .10s,
    color .24s ease;
}

/* Chinese glyphs are visually wider than Latin initials,
   so the collapsed first-character target needs a slightly smaller shift. */
body[data-locale="zh_cn"] .app.sidebar-collapsed .nav-letter{
  transform:translateX(15.5px);
}

.main{
  flex:1;
  min-width:0;
  overflow:auto;
  padding:var(--main-pad-y) var(--main-pad-x);
  transition:
    transform .34s var(--ease),
    opacity .28s ease;
}
.header{
  max-width:var(--content-max);
  margin-bottom:25px;
  padding-right:170px;
  transition:
    max-width .52s var(--spring-soft);
}
/* Do not transform .header itself. The language pill is fixed inside it;
   transforming the ancestor makes the fixed pill jump during section changes. */
.header.is-changing{
  opacity:1;
  transform:none;
}
.header.is-changing .top-row > div:first-child,
.header.is-changing > p{
  opacity:.42;
  transform:translateY(4px);
  transition:opacity .20s ease, transform .24s var(--ease);
}
.top-row{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:18px;
  margin-bottom:10px;
}
.kicker{
  font-size:13px;
  color:#8b8e94;
  font-weight:560;
  margin-bottom:9px;
}
.header h1{
  font-size:clamp(36px,4.3vw,52px);
  line-height:1;
  letter-spacing:-.03em;
  font-weight:780;
  margin-bottom:12px;
}
.header p{
  max-width:620px;
  font-size:14px;
  line-height:1.55;
  color:var(--muted);
}

/* language switch */
.lang-switch{
  position:fixed;
  top:calc(var(--main-pad-y) + 2px);
  right:var(--main-pad-x);
  z-index:12;
  flex-shrink:0;
  display:inline-flex;
  align-items:center;
  gap:4px;
  padding:4px;
  background:rgba(255,255,255,.78);
  border:1px solid var(--line);
  border-radius:999px;
  backdrop-filter:none;
  -webkit-backdrop-filter:none;
  box-shadow:0 8px 24px rgba(0,0,0,.04);
  overflow:hidden;
}
.lang-switch.busy{
  pointer-events:none;
}
.lang-indicator{
  position:absolute;
  left:4px;
  top:4px;
  width:54px;
  height:34px;
  border-radius:999px;
  background:var(--black);
  box-shadow:0 12px 28px rgba(0,0,0,.12);
  transform:translateX(var(--lang-indicator-x,0px));
  transition:
    transform .48s var(--spring),
    width .34s var(--spring-soft);
  z-index:0;
}
.lang-btn{
  position:relative;
  z-index:1;
  border:none;
  background:transparent;
  color:#666a70;
  min-width:54px;
  height:34px;
  padding:0 12px;
  border-radius:999px;
  font-size:13px;
  font-weight:640;
  cursor:pointer;
  transition:color .22s ease, transform .18s var(--ease), opacity .16s ease;
}
.lang-btn:hover{ transform:translateY(-1px); }
.lang-btn.active{ color:#fff; }
.lang-btn:focus-visible{
  outline:3px solid rgba(0,0,0,.12);
  outline-offset:3px;
}

/* locale text transition */
.locale-scope{
  transition:opacity .18s ease, transform .28s var(--ease), filter .18s ease;
}
.locale-scope.locale-out{
  opacity:0;
  transform:translateY(6px);
  filter:blur(2px);
}
.locale-scope.locale-in{
  animation:localeIn .34s var(--ease);
}
@keyframes localeIn{
  0%{ opacity:0; transform:translateY(8px) scale(.992); filter:blur(2px); }
  70%{ opacity:1; transform:translateY(-1px) scale(1.003); filter:blur(0); }
  100%{ opacity:1; transform:translateY(0) scale(1); filter:blur(0); }
}

/* Keep the language switch physically pinned while locale text animates.
   The old animation class was applied to .header, and any transform on a
   fixed element's ancestor makes the fixed pill use that ancestor as its
   containing block, so it visibly jumps during language switching. */
.header.locale-scope.locale-out,
.header.locale-scope.locale-in{
  opacity:1;
  transform:none;
  filter:none;
  animation:none;
}
.header.locale-scope.locale-out .top-row > div:first-child,
.header.locale-scope.locale-out > p{
  opacity:0;
  transform:translateY(6px);
  filter:blur(2px);
  transition:opacity .18s ease, transform .28s var(--ease), filter .18s ease;
}
.header.locale-scope.locale-in .top-row > div:first-child,
.header.locale-scope.locale-in > p{
  animation:localeIn .34s var(--ease);
}
.lang-switch{
  contain:layout paint;
  transform:translateZ(0);
}

.theme-toggle{
  position:fixed;
  right:calc(var(--main-pad-x) + env(safe-area-inset-right));
  bottom:calc(26px + env(safe-area-inset-bottom));
  z-index:18;
  width:var(--theme-btn-size);
  height:var(--theme-btn-size);
  border:1px solid var(--line);
  border-radius:999px;
  background:rgba(255,255,255,.78);
  color:var(--text);
  cursor:pointer;
  display:grid;
  place-items:center;
  overflow:hidden;
  backdrop-filter:none;
  -webkit-backdrop-filter:none;
  box-shadow:0 10px 28px rgba(0,0,0,.06);
  transition:
    transform .24s var(--spring-soft),
    background-color .24s ease,
    border-color .24s ease,
    box-shadow .24s ease,
    color .24s ease;
}
.theme-toggle:hover{
  transform:translateY(-2px) scale(1.025);
  box-shadow:0 16px 36px rgba(0,0,0,.10);
}
.theme-toggle:active{ transform:scale(.96); }
.theme-toggle.theme-busy{ pointer-events:none; }
.theme-toggle:focus-visible{
  outline:3px solid rgba(0,0,0,.12);
  outline-offset:3px;
}
.theme-orbit{
  position:relative;
  width:34px;
  height:46px;
  display:block;
  transform-origin:50% 50%;
  will-change:transform;
  transform:translateZ(0);
  contain:layout paint;
}
.theme-icon{
  position:absolute;
  left:50%;
  top:50%;
  width:18px;
  height:18px;
  opacity:0;
  filter:blur(.35px);
  transform:translate3d(-50%,-50%,0) scale(.58);
  transform-origin:50% 50%;
  transition:
    opacity .28s ease,
    transform .42s var(--spring-soft),
    filter .28s ease;
  backface-visibility:hidden;
}
.theme-icon.sun{
  opacity:1;
  filter:none;
  transform:translate3d(-50%,-50%,0) scale(1);
}
.theme-icon.moon{
  opacity:0;
  filter:blur(.35px);
  transform:translate3d(-50%,-50%,0) scale(.58);
}
html[data-theme="dark"] .theme-icon.sun{
  opacity:0;
  filter:blur(.35px);
  transform:translate3d(-50%,-50%,0) scale(.58);
}
html[data-theme="dark"] .theme-icon.moon{
  opacity:1;
  filter:none;
  transform:translate3d(-50%,-50%,0) scale(1);
}
.theme-toggle.is-switching{
  animation:themeButtonSwap 1s cubic-bezier(.236,.72,.382,1) both;
}
.theme-toggle.is-switching .theme-orbit{
  transform:translateZ(0);
}
.theme-toggle.is-switching .theme-icon{
  opacity:.96;
  transition:none;
  will-change:transform, opacity;
  backface-visibility:hidden;
}
.theme-toggle.is-switching.to-dark .theme-icon.sun{
  animation:themeSunToDark .618s linear .0618s both;
}
.theme-toggle.is-switching.to-dark .theme-icon.moon{
  animation:themeMoonToDark .618s linear .0618s both;
}
.theme-toggle.is-switching.to-light .theme-icon.moon{
  animation:themeMoonToLight .618s linear .0618s both;
}
.theme-toggle.is-switching.to-light .theme-icon.sun{
  animation:themeSunToLight .618s linear .0618s both;
}
@keyframes themeButtonSwap{
  0%{ transform:scale(1); }
  16%{ transform:scale(1.16); }
  74%{ transform:scale(1.16); }
  100%{ transform:scale(1); }
}

/* The icons always orbit in one direction. The SVG face is not rotated;
   speed changes come from golden-ratio key spacing, not from end-stop easing. */
@keyframes themeSunToDark{
  0%{ opacity:1; filter:blur(0); transform:translate3d(-50%,-50%,0) translate3d(0,-12px,0) scale(1); }
  12%{ opacity:1; filter:blur(.45px); transform:translate3d(-50%,-50%,0) translate3d(4.6px,-11.1px,0) scale(.995); }
  23.6%{ opacity:.99; filter:blur(1.05px); transform:translate3d(-50%,-50%,0) translate3d(9.7px,-7.1px,0) scale(.975); }
  38.2%{ opacity:.93; filter:blur(1.25px); transform:translate3d(-50%,-50%,0) translate3d(13px,0,0) scale(.94); }
  61.8%{ opacity:.78; filter:blur(.75px); transform:translate3d(-50%,-50%,0) translate3d(9.7px,7.1px,0) scale(.9); }
  76.4%{ opacity:.66; filter:blur(.35px); transform:translate3d(-50%,-50%,0) translate3d(4.6px,11.1px,0) scale(.875); }
  100%{ opacity:.58; filter:blur(.16px); transform:translate3d(-50%,-50%,0) translate3d(0,12px,0) scale(.86); }
}
@keyframes themeMoonToDark{
  0%{ opacity:.58; filter:blur(.16px); transform:translate3d(-50%,-50%,0) translate3d(0,12px,0) scale(.86); }

html[data-theme="dark"] .theme-toggle:hover{ box-shadow:0 16px 36px rgba(0,0,0,.34); }


/* Theme reveal: the new theme is clipped into view from the toggle button,
   so the visible arc expands from the lower corner toward the upper-right area. */
html.theme-transitioning::view-transition-group(root){
  animation-duration:.618s;
}
::view-transition-old(root),
::view-transition-new(root){
  animation:none;
  mix-blend-mode:normal;
}
::view-transition-old(root){ z-index:1; }
::view-transition-new(root){ z-index:2; }
html.theme-transitioning::view-transition-new(root){
  animation:themeReveal .72s cubic-bezier(.236,.72,.382,1) both;
}
html.theme-transitioning::view-transition-old(root){
  animation:themeOldHold .72s cubic-bezier(.236,.72,.382,1) both;
}
@keyframes themeReveal{
  from{ clip-path:circle(0 at var(--theme-wave-x, calc(100vw - 70px)) var(--theme-wave-y, calc(100vh - 70px))); }
  to{ clip-path:circle(var(--theme-wave-r, 150vmax) at var(--theme-wave-x, calc(100vw - 70px)) var(--theme-wave-y, calc(100vh - 70px))); }
}
@keyframes themeOldHold{
  from{ opacity:1; }
  to{ opacity:1; }
}
.theme-wave{
  position:fixed;
  left:var(--wave-x, 50vw);
  top:var(--wave-y, 50vh);
  width:1px;
  height:1px;
  border-radius:9999px;
  pointer-events:none;
  z-index:999;
  opacity:0;
  transform:translate(-50%,-50%) scale(0);
  background:
    radial-gradient(circle, rgba(255,255,255,.18) 0 1px, transparent 2px 100%),
    var(--wave-bg, #111214);
  box-shadow:0 0 0 1px rgba(255,255,255,.10), 0 0 18px rgba(0,0,0,.16);
  will-change:transform, opacity;
}
.theme-wave.run{
  animation:themeWaveFallback .618s cubic-bezier(.618,0,.382,1) both;
}

.theme-wave::after{
  content:"";
  position:absolute;
  inset:-1px;
  border-radius:inherit;
  background:radial-gradient(circle, rgba(255,255,255,.18), rgba(255,255,255,.04) 38.2%, transparent 61.8%);
  opacity:.72;
  pointer-events:none;
}

@keyframes themeWaveFallback{
  0%{ opacity:1; transform:translate(-50%,-50%) scale(0); }
  72%{ opacity:1; }
  100%{ opacity:0; transform:translate(-50%,-50%) scale(var(--wave-scale, 2400)); }
}
.drawer-head.drawer-out,
.form.drawer-out{
  opacity:0;
  transform:translateY(6px);
  filter:blur(1px);
  transition:opacity .18s ease, transform .24s var(--spring-soft), filter .18s ease;
}

.cards{

  gap:14px;

    opacity .2s ease,
    transform .24s var(--ease),

}
.app.sidebar-collapsed .cards{

}
.app.sidebar-collapsed .header{

}
.cards.is-changing{

}
.card{

  background:rgba(255,255,255,.86);
  border:1px solid var(--line);
  border-radius:22px;
  padding:19px 22px;
  min-height:82px;

    transform .22s var(--ease),
    box-shadow .22s ease,
    border-color .22s ease,
    background-color .22s ease,
    opacity .2s ease;
}
.card:hover{
  transform:translateY(-1px);
  background:#fff;
  border-color:rgba(0,0,0,.105);
  box-shadow:var(--shadow);
}
.card:active{ transform:scale(.992); }
.card:focus-visible{
  outline:3px solid rgba(0,0,0,.12);
  outline-offset:3px;
}
.card.enabled{ border-color:rgba(0,0,0,.10); }
.left{ min-width:0; }
.left h2{
  font-size:clamp(21px,2vw,25px);
  line-height:1.12;
  letter-spacing:-.022em;
  font-weight:680;
  margin-bottom:5px;
}
.left span{

  color:#858991;

}
.detail-mark{

  color:#8b8f96;

}
.meta{

}
.detail-hint{
  font-size:13px;
  color:#8b8f96;
  opacity:0;
  transform:translateX(-4px);
  transition:opacity .18s ease, transform .22s var(--ease), color .18s ease;
}
.card.has-detail:hover .detail-hint{

}
.chevron{
  width:24px;
  height:24px;
  border-radius:999px;
  display:grid;
  place-items:center;
  color:#aaa;
  opacity:.55;
  transform:translateX(-3px);

}
.card.has-detail:hover .chevron{

}
.toggle{
  width:52px;
  height:30px;
  border-radius:999px;
  background:#dedfe1;

}
.toggle::after{
  content:"";
  position:absolute;
  left:4px;
  top:4px;
  width:22px;
  height:22px;
  border-radius:999px;
  background:#fff;

}
.toggle.on{ background:var(--black); }
.toggle.on::after{ transform:translateX(22px); }
.toggle:active::after{ width:26px; }
.toggle.on:active::after{ transform:translateX(18px); }

.drawer{
  position:fixed;
  top:0;
  right:0;

.custom-select{
  position:relative;
}
.select-trigger{
  width:100%;
  min-height:48px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:14px;
  border:1px solid rgba(0,0,0,.10);
  background:#f7f7f8;
  padding:12px 14px;
  border-radius:16px;
  color:#111214;
  cursor:pointer;
  outline:none;
  transition:
    border-color .18s ease,
    background-color .18s ease,
    box-shadow .18s ease,
    transform .24s var(--spring-soft),
    border-radius .24s var(--spring-soft);
}
.select-trigger:hover{
  background:#fff;
}
.select-trigger:focus-visible{
  border-color:#111214;
  box-shadow:0 0 0 3px rgba(17,18,20,.08);
}
.select-value{
  min-width:0;
  text-align:left;
}
.select-caret{
  flex:0 0 auto;
  color:#7a7d84;
  font-size:16px;
  line-height:1;
  transform:translateY(-1px) rotate(0deg);
  transition:transform .34s var(--spring-soft), color .18s ease;
}
.custom-select.open .select-trigger{
  background:#fff;
  border-color:rgba(0,0,0,.14);
  border-radius:16px 16px 0 0;
  border-bottom-color:transparent;
  box-shadow:0 8px 22px rgba(0,0,0,.055);
}
.custom-select.open .select-caret{
  transform:translateY(1px) rotate(180deg);
  color:#111214;
}

/* The menu is visually welded to the input: same width, shared border,
   no native dropdown strip, and no awkward black block leaking at the left edge. */
.select-menu{
  position:absolute;
  left:0;
  right:0;
  top:calc(100% - 1px);
  background:#fff;
  border:1px solid rgba(0,0,0,.14);
  border-top:none;
  border-radius:0 0 16px 16px;
  overflow:hidden;
  box-shadow:0 20px 38px rgba(0,0,0,.075);
  opacity:0;
  transform:translateY(-8px) scaleY(.94);
  transform-origin:top center;
  pointer-events:none;
  transition:
    opacity .18s ease,
    transform .30s var(--spring-soft),
    box-shadow .20s ease;
  z-index:30;
}
.custom-select.open .select-menu{
  opacity:1;
  transform:translateY(0) scaleY(1);
  pointer-events:auto;
}
.custom-select.open{
  z-index:31;
}
.custom-select.open .select-trigger{
  animation:selectTopExpand .34s var(--spring-soft);
}
.custom-select.open .select-menu{
  animation:selectMenuExpand .34s var(--spring-soft);
}
@keyframes selectTopExpand{
  0%{ transform:scale(1); }
  62%{ transform:scale(1.008); }
  100%{ transform:scale(1); }
}
@keyframes selectMenuExpand{
  0%{ opacity:0; transform:translateY(-8px) scaleY(.94); }
  72%{ opacity:1; transform:translateY(1px) scaleY(1.015); }
  100%{ opacity:1; transform:translateY(0) scaleY(1); }
}
.select-option{
  width:100%;
  height:42px;
  border:none;
  border-top:1px solid rgba(0,0,0,.055);
  background:#fff;
  color:#111214;
  text-align:left;
  padding:0 14px;

.select-option:first-child{

.select-option:hover{

}
.select-option.active{

}
.select-option.active:first-child{
  border-radius:0;
}
.select-option.active:last-child{

}
.select-option:active{

}

.mask{

html.boot-theme-light{
  --boot-bg:#f5f5f7;
  --boot-text:#111214;
}
html.boot-theme-dark{
  --boot-bg:#000;
  --boot-text:#f4f4f5;
}

/* Boot welcome intro */
.boot-intro{
  position:fixed;
  inset:0;
  z-index:10000;
  display:grid;
  place-items:center;
  background:var(--boot-bg,#000);
  color:var(--boot-text,#f4f4f5);
  overflow:hidden;
  pointer-events:none;
  animation:bootIntroExit .618s cubic-bezier(.382,0,.236,1) 5.618s both;
}
.boot-logo{
  --boot-o-shift:0px;
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:0;
  font-size:clamp(38px,5.4vw,68px);
  line-height:1;
  font-weight:820;
  letter-spacing:-.04em;
  white-space:nowrap;
  transform:translateZ(0);
}
.boot-left-wrap,
.boot-right-wrap{
  overflow:visible;
  display:flex;
  align-items:center;
  transform:translateZ(0);
}
.boot-left,
.boot-right{
  display:inline-block;
  opacity:0;
  filter:none;
  will-change:transform, opacity;
  backface-visibility:hidden;
}
.boot-left{
  transform-origin:right center;
  transform:translate3d(14px,0,0) scaleX(.001);
  animation:bootLeftOpen 1.382s cubic-bezier(.236,.72,.382,1) 2.258s both;
}
.boot-right{
  transform-origin:left center;
  transform:translate3d(-14px,0,0) scaleX(.001);
  animation:bootRightOpen 1.382s cubic-bezier(.236,.72,.382,1) 2.258s both;
}
.boot-o{
  display:inline-block;
  position:relative;
  z-index:2;
  opacity:0;
  transform:translate3d(var(--boot-o-shift),0,0) scale(.78);
  filter:none;
  will-change:transform, opacity;
  backface-visibility:hidden;
  animation:bootOTravel 3.382s cubic-bezier(.236,.72,.382,1) .236s both;
}

body.booting .app,
body.booting .theme-toggle{
  opacity:0;
  filter:none;
  transform:scale(.986);
}
body.app-revealing .app,
body.app-revealing .theme-toggle{
  animation:bootAppReveal .854s cubic-bezier(.236,.72,.382,1) both;
  will-change:opacity, transform, filter;
}

@keyframes bootOTravel{
  0%{
    opacity:0;
    transform:translate3d(var(--boot-o-shift),0,0) scale(.78);
    filter:none;
  }
  23.6%{
    opacity:1;
    transform:translate3d(var(--boot-o-shift),0,0) scale(1);
    filter:none;
  }
  59.8%{
    opacity:1;
    transform:translate3d(var(--boot-o-shift),0,0) scale(1);
    filter:none;
  }
  100%{
    opacity:1;
    transform:translate3d(0,0,0) scale(1);
    filter:none;
  }
}
@keyframes bootLeftOpen{
  from{
    opacity:0;
    transform:translate3d(14px,0,0) scaleX(.001);
    filter:none;
  }
  to{
    opacity:1;
    transform:translate3d(0,0,0) scaleX(1);
    filter:none;
  }
}
@keyframes bootRightOpen{

/* Checkbox fields should not inherit the text-input box style.
   The real checkbox is visually hidden; the only visible control is this HEOS switch. */
.field.checkbox-field{
  position:relative;
  min-height:46px;
  display:grid;
  grid-template-columns:minmax(0,1fr) auto;
  align-items:center;
  gap:14px;
  cursor:pointer;
  user-select:none;
}
.field.checkbox-field label{
  line-height:1.25;
  cursor:pointer;
}
.field.checkbox-field input[type="checkbox"]{
  position:absolute;
  inline-size:1px;
  block-size:1px;
  opacity:0;
  pointer-events:none;
  appearance:none;
  -webkit-appearance:none;
  margin:0;
  padding:0;
  border:0;
}
.heos-switch{
  width:52px;
  height:30px;
  border-radius:999px;
  background:#dedfe1;
  position:relative;
  flex:0 0 auto;
  box-shadow:0 1px 2px rgba(0,0,0,.08) inset;
  transition:background-color .24s ease, transform .18s var(--ease), box-shadow .18s ease;
}
.heos-switch::after{
  content:"";
  position:absolute;
  left:4px;
  top:4px;
  width:22px;
  height:22px;
  border-radius:999px;
  background:#fff;
  box-shadow:0 2px 6px rgba(0,0,0,.16);
  transform:translateX(0);
  transition:transform .30s var(--ease), width .20s var(--ease), background-color .18s ease, box-shadow .18s ease;
}
.field.checkbox-field input[type="checkbox"]:checked + .heos-switch{
  background:var(--black);
}
.field.checkbox-field input[type="checkbox"]:checked + .heos-switch::after{
  transform:translateX(22px);
}
.field.checkbox-field:active .heos-switch{
  transform:scale(.97);
}
.field.checkbox-field input[type="checkbox"]:focus-visible + .heos-switch{
  box-shadow:0 0 0 3px rgba(17,18,20,.10), 0 1px 2px rgba(0,0,0,.08) inset;
}
html[data-theme="dark"] .heos-switch{
  background:#383a42;
}

  background:#f4f4f5;

function setupBootIntro(){
  const bootTheme = detectTheme();
  document.documentElement.classList.toggle("boot-theme-dark", bootTheme === "dark");
  document.documentElement.classList.toggle("boot-theme-light", bootTheme !== "dark");
  const intro = document.getElementById("bootIntro");
  const bootLogo = document.getElementById("bootLogo");
  const bootLeft = document.getElementById("bootLeft");
  const bootRight = document.getElementById("bootRight");
  const bootO = document.querySelector(".boot-o");
  if(!intro || !bootLogo || !bootLeft || !bootRight || !bootO) return;

  const locale = detectLocale();
  if(locale === "zh_cn"){
    intro.classList.add("boot-zh");
    bootLeft.textContent = "欢迎使用HE";
    bootRight.textContent = "S";
  }else{
    intro.classList.add("boot-en");
    bootLeft.textContent = "welcome to HE";
    bootRight.textContent = "S";
  }

  const updateOShift = () => {
    bootLogo.style.setProperty("--boot-o-shift", "0px");
    const oRect = bootO.getBoundingClientRect();
    const viewportCenter = window.innerWidth / 2;
    const oCenter = oRect.left + oRect.width / 2;
    bootLogo.style.setProperty("--boot-o-shift", `${viewportCenter - oCenter}px`);
  };

  intro.style.animationPlayState = "paused";
  bootLeft.style.animationPlayState = "paused";
  bootRight.style.animationPlayState = "paused";
  bootO.style.animationPlayState = "paused";
  requestAnimationFrame(() => {
    updateOShift();
    void intro.offsetWidth;
    intro.style.animationPlayState = "";
    bootLeft.style.animationPlayState = "";
    bootRight.style.animationPlayState = "";
    bootO.style.animationPlayState = "";
  });
  window.addEventListener("resize", updateOShift, {passive:true});

  let bootFinished = false;
  let bootCleaned = false;

  function revealApp(){
    if(bootFinished) return;
    bootFinished = true;
    document.body.classList.add("app-revealing");
    document.body.classList.remove("booting");
    requestAnimationFrame(() => {
      updateIndicator();
      updateLangIndicator();
    });
  }

  function cleanupBoot(){
    if(bootCleaned) return;
    bootCleaned = true;
    revealApp();
    window.removeEventListener("resize", updateOShift);
    intro.remove();
    document.body.classList.remove("app-revealing");
    document.documentElement.classList.remove("boot-theme-dark", "boot-theme-light");
  }

  intro.addEventListener("animationend", event => {
    if(event.animationName === "bootIntroExit") cleanupBoot();
  });

  document.addEventListener("visibilitychange", () => {
    if(!document.hidden && !bootCleaned){
      const elapsed = performance.now();
      if(elapsed > 6200) cleanupBoot();
    }
  }, {passive:true});

  window.setTimeout(revealApp, 5618);
  window.setTimeout(cleanupBoot, 6472);
  window.setTimeout(cleanupBoot, 9000);
}


let currentIndex = 0;
let currentLocale = detectLocale();
let openedModuleId = null;
let localeAnimating = false;
let pendingLocale = null;
let openedCustomSelect = null;

function detectLocale(){
  const saved = localStorage.getItem("heos_lang");
  if(saved && i18n[saved]) return saved;
  const lang = (navigator.language || navigator.userLanguage || "").toLowerCase();
  return lang.startsWith("zh") ? "zh_cn" : "en_us";
}
function tr(){ return i18n[currentLocale] || i18n.en_us; }

function detectTheme(){
  const saved = localStorage.getItem("heos_theme");
  if(saved === "dark" || saved === "light") return saved;
  return window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
}
function applyTheme(theme){
  const normalized = theme === "dark" ? "dark" : "light";
  document.documentElement.dataset.theme = normalized;
  localStorage.setItem("heos_theme", normalized);
  updateThemeButton();
}
function updateThemeButton(){
  if(!themeToggle) return;
  const isDark = document.documentElement.dataset.theme === "dark";
  themeToggle.setAttribute("aria-pressed", String(isDark));
  themeToggle.setAttribute("aria-label", isDark ? tr().lightMode : tr().darkMode);
  themeToggle.title = isDark ? tr().lightMode : tr().darkMode;
}
function getThemeWaveData(){
  const rect = themeToggle.getBoundingClientRect();
  const x = rect.left + rect.width / 2;
  const y = rect.top + rect.height / 2;
  const radius = Math.hypot(
    Math.max(x, window.innerWidth - x),
    Math.max(y, window.innerHeight - y)
  ) + 24;
  return {x, y, radius};
}
function playThemeButtonAnimation(nextTheme){
  themeToggle.classList.remove("is-switching", "to-dark", "to-light");
  void themeToggle.offsetWidth;
  themeToggle.classList.add("is-switching", nextTheme === "dark" ? "to-dark" : "to-light");
}
function finishThemeButtonAnimation(){
  themeToggle.classList.remove("is-switching", "to-dark", "to-light", "theme-busy");
}
function runThemeReveal(nextTheme, x, y, radius){
  document.documentElement.style.setProperty("--theme-wave-x", `${x}px`);
  document.documentElement.style.setProperty("--theme-wave-y", `${y}px`);
  document.documentElement.style.setProperty("--theme-wave-r", `${radius}px`);

  if(document.startViewTransition){
    document.documentElement.classList.add("theme-transitioning");
    const transition = document.startViewTransition(() => applyTheme(nextTheme));
    transition.finished.finally(() => {
      document.documentElement.classList.remove("theme-transitioning");
    });
    return;
  }

  if(themeWave){
    themeWave.classList.remove("run");
    themeWave.style.setProperty("--wave-x", `${x}px`);
    themeWave.style.setProperty("--wave-y", `${y}px`);
    themeWave.style.setProperty("--wave-scale", `${radius * 2}`);
    themeWave.style.setProperty("--wave-bg", nextTheme === "dark" ? "#111214" : "#f5f5f7");
    void themeWave.offsetWidth;
    themeWave.classList.add("run");
  }
  window.setTimeout(() => applyTheme(nextTheme), 90);
  window.setTimeout(() => {
    if(themeWave) themeWave.classList.remove("run");
  }, 760);
}
function toggleTheme(){
  if(themeToggle.classList.contains("theme-busy")) return;
  const nextTheme = document.documentElement.dataset.theme === "dark" ? "light" : "dark";
  const {x, y, radius} = getThemeWaveData();

  themeToggle.classList.add("theme-busy");
  playThemeButtonAnimation(nextTheme);

  // Golden-ratio pacing: let the icon orbit finish its fastest 61.8% segment first,
  // then start the page reveal during the slower settle phase to avoid a visible hitch.
  window.setTimeout(() => runThemeReveal(nextTheme, x, y, radius), 236);
  window.setTimeout(finishThemeButtonAnimation, 1180);
}

function closeCustomSelect(selectEl){
  if(!selectEl) return;
  selectEl.classList.remove("open");
  if(openedCustomSelect === selectEl) openedCustomSelect = null;
}
function openCustomSelect(selectEl){
  if(openedCustomSelect && openedCustomSelect !== selectEl){
    closeCustomSelect(openedCustomSelect);
  }
  selectEl.classList.add("open");
  openedCustomSelect = selectEl;
}
function buildCustomSelect(fieldKey, options, value){
  const wrap = document.createElement("div");
  wrap.className = "custom-select";

  const trigger = document.createElement("button");
  trigger.type = "button";
  trigger.className = "select-trigger";
  trigger.innerHTML = `<span class="select-value"></span><span class="select-caret">⌄</span>`;

  const menu = document.createElement("div");
  menu.className = "select-menu";

  const valueEl = trigger.querySelector(".select-value");
  let currentValue = value || options[0];

  function updateOptionsVisual(){
    [...menu.querySelectorAll(".select-option")].forEach(btn => {
      btn.classList.toggle("active", btn.dataset.value === currentValue);
    });
    valueEl.textContent = getFieldLabel(currentValue);
  }

  options.forEach(optValue => {
    const optionBtn = document.createElement("button");
    optionBtn.type = "button";
    optionBtn.className = "select-option";
    optionBtn.dataset.value = optValue;
    optionBtn.textContent = getFieldLabel(optValue);
    optionBtn.onclick = event => {
      event.stopPropagation();
      currentValue = optValue;
      updateOptionsVisual();
      closeCustomSelect(wrap);
      // This select edits the module's config value only.
      // The visible UI language is controlled exclusively by the top-right language switch.
    };
    menu.appendChild(optionBtn);
  });

  trigger.onclick = event => {
    event.stopPropagation();
    if(wrap.classList.contains("open")){
      closeCustomSelect(wrap);
    }else{
      openCustomSelect(wrap);
    }
  };

  wrap.append(trigger, menu);
  updateOptionsVisual();
  return wrap;
}
document.addEventListener("click", event => {
  if(openedCustomSelect && !openedCustomSelect.contains(event.target)){
    closeCustomSelect(openedCustomSelect);
  }
});

function updateLanguageButtons(){
  zhBtn.classList.toggle("active", currentLocale === "zh_cn");
  enBtn.classList.toggle("active", currentLocale === "en_us");
  zhBtn.setAttribute("aria-pressed", String(currentLocale === "zh_cn"));
  enBtn.setAttribute("aria-pressed", String(currentLocale === "en_us"));
  requestAnimationFrame(updateLangIndicator);
}
function updateLangIndicator(){
  const active = langSwitch.querySelector(".lang-btn.active");
  if(!active) return;
  const left = active.offsetLeft - 4;
  langSwitch.style.setProperty("--lang-indicator-x", `${left}px`);
  langIndicator.style.width = `${active.offsetWidth}px`;
}
function setStaticLocale(locale){
  if(!i18n[locale]) return;
  currentLocale = locale;
  localStorage.setItem("heos_lang", locale);
  document.documentElement.lang = tr().htmlLang;
  document.body.dataset.locale = currentLocale;
  document.title = tr().docTitle;
  kicker.textContent = tr().kicker;
  drawerSub.textContent = tr().drawerSub;
  closeBtn.setAttribute("aria-label", tr().closeAria);
  updateThemeButton();
  updateLanguageButtons();
  renderNav();
  renderCards();
  if(drawer.classList.contains("open") && openedModuleId){
    const mod = sections.flatMap(section => section.modules).find(item => item.id === openedModuleId);
    if(mod) openDetail(mod, true);
  }
}
function animateLocaleChange(locale){
  if(locale === currentLocale) return;
  const scopes = [header, cards, nav];
  if(drawer.classList.contains("open")){
    scopes.push(drawerHead, form);
  }
  scopes.forEach(el => {
    el.classList.remove("locale-in");
    el.classList.add("locale-out");
  });

  // Move the black pill immediately, then swap text mid-flight.
  currentLocale = locale;
  localStorage.setItem("heos_lang", locale);
  document.documentElement.lang = tr().htmlLang;
  document.body.dataset.locale = currentLocale;
  document.title = tr().docTitle;
  updateLanguageButtons();

  setTimeout(() => {
    kicker.textContent = tr().kicker;
    drawerSub.textContent = tr().drawerSub;
    closeBtn.setAttribute("aria-label", tr().closeAria);
    updateThemeButton();
    renderNav();
    renderCards();
    if(drawer.classList.contains("open") && openedModuleId){
      const mod = sections.flatMap(section => section.modules).find(item => item.id === openedModuleId);
      if(mod) openDetail(mod, true);
    }

    scopes.forEach(el => {
      el.classList.remove("locale-out");
      el.classList.add("locale-in");
    });

    setTimeout(() => {
      scopes.forEach(el => el.classList.remove("locale-in"));
    }, 340);
  }, 140);
}
function getSectionLabel(sectionId){
  return tr().sections[sectionId]?.title || sectionId;
}
function getSectionDesc(sectionId){
  return tr().sections[sectionId]?.desc || "";
}
function getModuleLabel(moduleId){
  return tr().modules[moduleId] || moduleId;
}
function getFieldLabel(fieldKey){
  return tr().fields[fieldKey] || fieldKey;
}

function renderNav(){
  [...nav.querySelectorAll(".nav-item")].forEach(item => item.remove());

  sections.forEach((sec, index)=>{
    const label = getSectionLabel(sec.id);
    const first = label.slice(0, 1);
    const rest = label.slice(1);

    const el = document.createElement("div");
    el.className = "nav-item" + (index === currentIndex ? " active":"");
    el.innerHTML = `<span class="nav-letter">${first}</span><span class="nav-rest">${rest}</span>`;
    el.tabIndex = 0;
    el.onclick = () => switchSection(index);
    el.onkeydown = event => {
      if(event.key === "Enter" || event.key === " "){
        event.preventDefault();
        switchSection(index);
      }
    };
    nav.appendChild(el);
  });

  requestAnimationFrame(updateIndicator);
}

function updateIndicator(){
  const active = nav.querySelector(".nav-item.active");
  if(!active) return;
  nav.style.setProperty("--indicator-y", `${active.offsetTop}px`);
  nav.style.setProperty("--indicator-x", `${active.offsetLeft}px`);
  navIndicator.style.height = `${active.offsetHeight}px`;
}

function switchSection(index){
  if(index === currentIndex) return;
  currentIndex = index;

  nav.querySelectorAll(".nav-item").forEach((item, i)=>{
    item.classList.toggle("active", i === currentIndex);
  });
  updateIndicator();

  header.classList.add("is-changing");
  cards.classList.add("is-changing");

  window.setTimeout(() => {
    renderCards();
    header.classList.remove("is-changing");
    cards.classList.remove("is-changing");
  }, 115);
}

function renderCards(){
  const current = sections[currentIndex];
  cards.innerHTML = "";
  title.textContent = getSectionLabel(current.id);
  desc.textContent = `${getSectionDesc(current.id)} ${tr().headerSuffix}`;

  current.modules.forEach(mod=>{
    const hasDetail = Array.isArray(mod.detail);
    const card = document.createElement("article");
    card.className = "card" + (hasDetail ? " has-detail" : "") + (mod.enabled ? " enabled" : "");
    card.tabIndex = 0;
    card.innerHTML = `
      <div class="left">
        <h2>${getModuleLabel(mod.id)}${hasDetail ? '<span class="detail-mark">*</span>' : ""}</h2>
        <span>${mod.key} ${tr().moduleSuffix}</span>
      </div>
      <div class="meta">
        <div class="detail-hint">${hasDetail ? tr().details : ""}</div>
        ${hasDetail ? '<div class="chevron" aria-hidden="true">›</div>' : ""}
        <div class="toggle ${mod.enabled ? "on":""}" role="switch" aria-checked="${mod.enabled ? "true" : "false"}" tabindex="0"></div>
      </div>
    `;
    const toggleEl = card.querySelector(".toggle");

    function runToggleAnimation(nextState){
      toggleEl.classList.remove("anim-on", "anim-off");
      void toggleEl.offsetWidth;
      toggleEl.classList.toggle("on", nextState);
      toggleEl.classList.add(nextState ? "anim-on" : "anim-off");
      toggleEl.setAttribute("aria-checked", String(nextState));
      window.setTimeout(() => {
        toggleEl.classList.remove("anim-on", "anim-off");
      }, 520);
    }

    function toggleModule(){
      mod.enabled = !mod.enabled;
      card.classList.toggle("enabled", mod.enabled);
      runToggleAnimation(mod.enabled);
    }

    toggleEl.onclick = event => {
      event.stopPropagation();
      toggleModule();
    };
    toggleEl.onkeydown = event => {
      if(event.key === "Enter" || event.key === " "){
        event.preventDefault();
        event.stopPropagation();
        toggleModule();
      }
    };

    card.onclick = event => {
      if(event.target.closest(".chevron") && hasDetail){
        openDetail(mod);
        return;
      }
      if(event.target.closest(".toggle")) return;
      toggleModule();
    };
    card.onkeydown = event => {
      if(event.key === "Enter" || event.key === " "){
        event.preventDefault();
        toggleModule();
      }
    };
    card.oncontextmenu = event => {
      event.preventDefault();
      if(!hasDetail) return;
      openDetail(mod);
    };
    cards.appendChild(card);
  });
}

function openDetail(mod, keepState = false){
  openedModuleId = mod.id;
  drawerTitle.textContent = getModuleLabel(mod.id);
  drawerSub.textContent = tr().drawerSub;
  form.innerHTML = "";
  mod.detail.forEach(([key, type, options, value])=>{
    const wrap = document.createElement("div");
    wrap.className = "field";
    const lab = document.createElement("label");
    lab.textContent = getFieldLabel(key);
    let input;
    if(type === "select"){
      input = buildCustomSelect(key, options, value || options[0]);
    }else if(type === "textarea"){
      input = document.createElement("textarea");
      input.value = value || "";
      input.name = key;
    }else{
      input = document.createElement("input");
      input.type = type;
      input.name = key;
      if(type === "checkbox"){
        wrap.classList.add("checkbox-field");
        input.checked = String(value).toLowerCase() === "true";
        input.value = input.checked ? "true" : "false";
        const switchVisual = document.createElement("span");
        switchVisual.className = "heos-switch";
        switchVisual.setAttribute("aria-hidden", "true");
        const syncCheckboxValue = () => {
          input.value = input.checked ? "true" : "false";
        };
        input.addEventListener("change", syncCheckboxValue);
        wrap.addEventListener("click", (event) => {
          if(event.target === input) return;
          input.checked = !input.checked;
          input.dispatchEvent(new Event("change", {bubbles:true}));
        });
        wrap.append(lab, input, switchVisual);
        form.appendChild(wrap);
        return;
      }else{
        input.value = value || "";
      }
    }
    wrap.append(lab, input);
    form.appendChild(wrap);
  });
  drawer.classList.remove("closing");
  drawerHead.classList.remove("drawer-out");
  form.classList.remove("drawer-out");
  drawer.classList.add("open");
  mask.classList.add("show");
  app.classList.add("drawer-open");
}

function closeDrawer(){
  if(!drawer.classList.contains("open")) return;
  drawerHead.classList.add("drawer-out");
  form.classList.add("drawer-out");
  drawer.classList.remove("open");
  drawer.classList.add("closing");
  mask.classList.remove("show");
  app.classList.remove("drawer-open");

  window.setTimeout(() => {
    drawer.classList.remove("closing");
    drawerHead.classList.remove("drawer-out");
    form.classList.remove("drawer-out");
    openedModuleId = null;
  }, 440);
}

function toggleSidebar(){
  const willCollapse = !app.classList.contains("sidebar-collapsed");
  app.classList.remove("sidebar-collapsing", "sidebar-expanding");
  app.classList.add(willCollapse ? "sidebar-collapsing" : "sidebar-expanding");
  app.classList.toggle("sidebar-collapsed");
  requestAnimationFrame(updateIndicator);
  window.setTimeout(updateIndicator, 440);
  window.setTimeout(() => {
    app.classList.remove("sidebar-collapsing", "sidebar-expanding");
  }, 560);
}

document.getElementById("logoBtn").onclick = toggleSidebar;
document.getElementById("logoBtn").onkeydown = event => {
  if(event.key === "Enter" || event.key === " "){
    event.preventDefault();
    toggleSidebar();
  }
};
closeBtn.onclick = closeDrawer;
mask.onclick = closeDrawer;
zhBtn.onclick = () => animateLocaleChange("zh_cn");
enBtn.onclick = () => animateLocaleChange("en_us");
themeToggle.onclick = toggleTheme;
window.addEventListener("resize", () => {
  updateIndicator();
  updateLangIndicator();
});

setupBootIntro();
applyTheme(detectTheme());
setStaticLocale(currentLocale);
updateLangIndicator();
</script>
